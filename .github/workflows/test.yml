name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies (IMPORTANT: Backend folder)
      - name: Install dependencies
        run: |
          cd Backend
          npm install

      # 4. Run tests (if exists)
      - name: Run tests
        run: |
          cd Backend
          npm test --if-present

      # 5. Check server start (VERY IMPORTANT)
      - name: Check server start
        run: |
          cd Backend
          node server.js &
          sleep 5
          curl http://localhost:3000/health || exit 1

      # 6. Success
      - name: Success message
        run: echo "✅ Backend is working correctly"